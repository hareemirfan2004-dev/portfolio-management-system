<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Portfolio Manager{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body  { font-family: system-ui, -apple-system, sans-serif; background: #f3f4f6; color: #111827; }

    /* ── Header ── */
    header { background: #1e3a5f; color: #fff; padding: .75rem 1.5rem;
             display: flex; align-items: center; gap: 2rem; }
    header h1 { font-size: 1rem; font-weight: 700; letter-spacing: .03em; white-space: nowrap; }
    nav   { display: flex; gap: 1.5rem; }
    nav a { color: #93c5fd; text-decoration: none; font-size: .875rem; font-weight: 500; }
    nav a:hover { color: #fff; }

    /* ── Layout ── */
    main  { max-width: 1040px; margin: 2rem auto; padding: 0 1.25rem; }
    h2    { font-size: 1.2rem; font-weight: 700; color: #1e3a5f; margin-bottom: 1.1rem; }

    /* ── Cards ── */
    .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.1);
            padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; }

    /* ── Tables ── */
    table { width: 100%; border-collapse: collapse; background: #fff;
            border-radius: 8px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.1);
            margin-bottom: 1.5rem; }
    th    { background: #1e3a5f; color: #fff; padding: .6rem .9rem;
            text-align: left; font-size: .78rem; font-weight: 600;
            letter-spacing: .05em; text-transform: uppercase; white-space: nowrap; }
    td    { padding: .55rem .9rem; border-bottom: 1px solid #f0f0f0; font-size: .875rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover td      { background: #f8faff; }
    .num  { text-align: right; font-variant-numeric: tabular-nums; }

    /* ── Badges ── */
    .badge       { display: inline-block; padding: .15rem .55rem; border-radius: 99px;
                   font-size: .75rem; font-weight: 600; }
    .badge-stock { background: #dbeafe; color: #1d4ed8; }
    .badge-fund  { background: #fef9c3; color: #92400e; }

    /* ── P&L colours ── */
    .gain { color: #15803d; font-weight: 600; }
    .loss { color: #b91c1c; font-weight: 600; }

    /* ── Forms ── */
    .form-grid   { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem 1.25rem; }
    .form-full   { grid-column: 1 / -1; }
    label        { display: block; font-size: .82rem; font-weight: 600;
                   color: #374151; margin-bottom: .25rem; }
    input[type="text"], input[type="email"], input[type="number"],
    select       { width: 100%; padding: .45rem .65rem; border: 1px solid #d1d5db;
                   border-radius: 5px; font-size: .875rem; background: #fff; }
    input:focus, select:focus { outline: none; border-color: #3b82f6;
                                box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
    .radio-row   { display: flex; gap: 1.5rem; align-items: center; padding: .5rem 0; }
    .radio-row label { display: flex; align-items: center; gap: .4rem;
                       font-weight: normal; margin-bottom: 0; cursor: pointer; }
    .radio-row input { width: auto; }

    /* ── Buttons ── */
    .btn   { display: inline-block; padding: .45rem 1.1rem; background: #1e3a5f;
             color: #fff; border: none; border-radius: 5px; font-size: .875rem;
             font-weight: 500; cursor: pointer; text-decoration: none; }
    .btn:hover  { background: #274d82; }
    .btn-sm     { padding: .28rem .65rem; font-size: .8rem; }
    .btn-muted  { background: #6b7280; }
    .btn-muted:hover { background: #4b5563; }

    /* ── Alerts ── */
    .alert         { padding: .7rem 1rem; border-radius: 5px;
                     margin-bottom: 1rem; font-size: .875rem; }
    .alert-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    .alert-error   { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

    /* ── Utilities ── */
    .muted  { color: #6b7280; font-size: .85rem; }
    .gap-sm { display: flex; align-items: baseline; gap: .75rem; flex-wrap: wrap; }
    .ml-auto { margin-left: auto; }
    code { background: #f3f4f6; padding: .1em .35em; border-radius: 3px;
           font-size: .85em; font-family: ui-monospace, monospace; }
    .mt1 { margin-top: 1rem; }
    .empty-row td { text-align: center; color: #9ca3af; padding: 1.75rem; }
  </style>
</head>
<body>

<header>
  <h1>Portfolio Manager</h1>
  <nav>
    <a href="{{ url_for('clients') }}">Clients</a>
    <a href="{{ url_for('place_order') }}">Place Order</a>
    <a href="{{ url_for('summary') }}">Summary</a>
  </nav>
</header>

<main>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</main>

</body>
</html>
