<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Portfolio Management System for tracking investments and clients.">
  <title>{% block title %}Portfolio Manager{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --card-border: #334155;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #2563eb;
      --accent-hover: #3b82f6;
      --gain: #10b981;
      --loss: #ef4444;
      --header-bg: #0f172a;
    }
    
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── Header ── */
    header {
      background: var(--header-bg);
      border-bottom: 1px solid var(--card-border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    header h1 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #fff;
    }
    
    nav { display: flex; gap: 1.5rem; align-items: center; }
    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
    }
    nav a:hover { color: #fff; }

    /* ── Layout ── */
    main {
      max-width: 1100px;
      margin: 2.5rem auto;
      padding: 0 1.5rem;
    }
    h2 { font-size: 1.25rem; font-weight: 600; margin-bottom: 1rem; }

    /* ── Cards ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 4px;
      padding: 1.5rem 2rem;
      margin-bottom: 2rem;
    }

    /* ── Tables ── */
    .table-container {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 2rem;
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      background: var(--card-bg);
      color: var(--text-muted);
      padding: 0.75rem 1rem;
      text-align: left;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      border-bottom: 1px solid var(--card-border);
    }
    td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--card-border);
      font-size: 0.9rem;
      color: var(--text-main);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #243042; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem; border-radius: 3px;
      font-size: 0.75rem; font-weight: 500;
    }
    .badge-stock { background: #1e3a8a; color: #bfdbfe; }
    .badge-fund { background: #78350f; color: #fde68a; }

    /* ── P&L colours ── */
    .gain { color: var(--gain); font-weight: 500; }
    .loss { color: var(--loss); font-weight: 500; }

    /* ── Forms ── */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-full { grid-column: 1 / -1; }
    label { display: block; font-size: 0.85rem; font-weight: 500; color: var(--text-muted); margin-bottom: 0.3rem; }
    input[type="text"], input[type="email"], input[type="password"], input[type="number"], select {
      width: 100%; padding: 0.5rem 0.75rem;
      background: #0f172a;
      border: 1px solid var(--card-border);
      border-radius: 3px; color: #fff; font-size: 0.9rem; font-family: inherit;
    }
    input:focus, select:focus {
      outline: none; border-color: var(--accent);
    }
    .radio-row { display: flex; gap: 1rem; align-items: center; padding: 0.2rem 0; }
    .radio-row label { display: flex; align-items: center; gap: 0.4rem; font-weight: 500; cursor: pointer; font-size: 0.9rem; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0.5rem 1rem;
      background: var(--accent); color: #fff;
      border: 1px solid var(--accent); border-radius: 3px; font-size: 0.85rem; font-weight: 500;
      cursor: pointer; text-decoration: none;
    }
    .btn:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    
    .btn-sm { padding: 0.25rem 0.6rem; font-size: 0.75rem; }
    
    .btn-muted { background: var(--card-bg); border-color: var(--card-border); color: var(--text-main); }
    .btn-muted:hover { background: #334155; border-color: #475569; }

    /* ── Alerts ── */
    .alert { padding: 0.75rem 1rem; border-radius: 3px; margin-bottom: 1.5rem; font-size: 0.9rem; }
    .alert-success { background: #064e3b; color: #34d399; border: 1px solid #059669; }
    .alert-error { background: #7f1d1d; color: #fca5a5; border: 1px solid #dc2626; }

    /* ── Utilities ── */
    .muted { color: var(--text-muted); font-size: 0.85rem; }
    .gap-sm { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .ml-auto { margin-left: auto; }
    code { background: #334155; padding: 0.1em 0.3em; border-radius: 3px; font-size: 0.85em; font-family: monospace; }
    .mt1 { margin-top: 1rem; }
    .empty-row td { text-align: center; color: var(--text-muted); padding: 1.5rem 1rem; }
  </style>
</head>
<body>

<header>
  <h1>Portfolio Manager</h1>
  <nav>
    {% if session.get('admin_id') %}
      <a href="{{ url_for('clients') }}">Clients</a>
      <a href="{{ url_for('place_order') }}">Place Order</a>
      <a href="{{ url_for('orders') }}">Pending Orders</a>
      <a href="{{ url_for('summary') }}">Summary</a>
      <a href="{{ url_for('logout') }}" class="btn btn-sm btn-muted" style="margin-left: 1rem;">Logout</a>
    {% endif %}
  </nav>
</header>

<main>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }}">
        {{ message }}
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</main>

</body>
</html>
