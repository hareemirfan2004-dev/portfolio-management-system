{% extends "base.html" %}
{% block title %}Login — Portfolio Manager{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 4rem auto; padding: 2.5rem 2rem;">
  <div style="text-align: center; margin-bottom: 2rem;">
    <svg width="48" height="48" fill="none" stroke="var(--accent)" stroke-width="1.5" viewBox="0 0 24 24" style="margin: 0 auto 1rem; opacity: 0.8;">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
    </svg>
    <h2 style="margin-bottom: 0.25rem;">Admin Login</h2>
    <p class="muted">Sign in to manage portfolios</p>
  </div>
  
  <form method="post">
    <div style="margin-bottom: 1.25rem;">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autofocus placeholder="e.g. admin">
    </div>
    <div style="margin-bottom: 2rem;">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required placeholder="••••••••">
    </div>
    <button type="submit" class="btn" style="width: 100%; padding: 0.8rem; font-size: 1rem;">Sign In</button>
  </form>
</div>
{% endblock %}
